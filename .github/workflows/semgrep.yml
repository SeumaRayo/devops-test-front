name: Semgrep SAST

# Triggers Gitflow:
#   push a develop, main, release/*, hotfix/*  -> escaneo en la rama destino
#   PR a develop                               -> baseline scan (solo codigo nuevo)
#   PR a main                                  -> politica estricta, bloquea ERROR
on:
  push:
    branches: [develop, main, 'release/*', 'hotfix/*']
  pull_request:
    branches: [develop, main]

permissions:
  security-events: write
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep

    steps:
      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historia completa para baseline diff

      - name: Determinar politica segun rama
        id: policy
        shell: bash
        run: |
          STRICT="false"
          BASELINE=""

          # PR contra main -> estricto
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "main" ]; then
            STRICT="true"
          fi

          # Push a main / release/* / hotfix/* -> estricto
          if [ "${{ github.ref }}" = "refs/heads/main" ] \
            || [[ "${{ github.ref }}" == refs/heads/release/* ]] \
            || [[ "${{ github.ref }}" == refs/heads/hotfix/* ]]; then
            STRICT="true"
          fi

          # PR a develop -> baseline scan, reporta solo findings nuevos
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" = "develop" ]; then
            BASELINE="--baseline-commit=origin/develop"
          fi

          echo "strict=$STRICT"     >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT
          echo "Politica -> strict=$STRICT  baseline='$BASELINE'"

      - name: Ejecutar Semgrep
        shell: bash
        run: |
          STRICT_FLAGS=""
          if [ "${{ steps.policy.outputs.strict }}" = "true" ]; then
            STRICT_FLAGS="--error --severity=ERROR"
          fi

          semgrep scan \
            --config=p/ci \
            --config=p/typescript \
            --config=p/react \
            --config=p/javascript \
            --config=p/xss \
            --config=p/secrets \
            --config=.semgrep/ \
            ${{ steps.policy.outputs.baseline }} \
            $STRICT_FLAGS \
            --exclude="*.test.ts" \
            --exclude="*.test.tsx" \
            --exclude="*.spec.ts" \
            --exclude="*.spec.tsx" \
            ./src

      - name: Publicar SARIF en Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
